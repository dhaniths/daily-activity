name: Daily activity

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update daily log
        run: |
          mkdir -p activity
          echo "Last update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > activity/daily.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add activity/daily.txt
          git commit -m "chore: daily activity update" || exit 0
          git push
